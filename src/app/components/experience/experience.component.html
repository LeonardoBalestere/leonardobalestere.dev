<section id="experience" class="py-24 px-6 bg-gray-900/50">
  <div class="max-w-6xl mx-auto">
    <div class="mb-14">
      <p class="text-brand-green font-mono text-sm tracking-widest uppercase mb-2">Carreira</p>
      <h2 class="text-3xl md:text-4xl font-bold text-white">Experiência</h2>
    </div>
    <div class="space-y-10">
      <div
        *ngFor="let exp of experiences"
        class="relative pl-8 border-l-2 border-gray-700 hover:border-brand-green transition-colors duration-300"
      >
        <div class="absolute -left-2 top-0 w-4 h-4 bg-brand-green rounded-full"></div>
        <div class="flex flex-wrap items-center gap-3 mb-2">
          <h3 class="text-xl font-bold text-white">{{ exp.title }}</h3>
          <span class="text-xs font-mono px-2 py-0.5 bg-brand-blue/10 text-brand-blue border border-brand-blue/20 rounded-full">
            {{ exp.type }}
          </span>
        </div>
        <p class="text-sm font-mono text-gray-500 mb-4">{{ exp.period }}</p>
        <p class="text-gray-400 mb-6 leading-relaxed">{{ exp.description }}</p>
        <ul class="space-y-2 mb-6">
          <li *ngFor="let highlight of exp.highlights" class="flex items-start gap-2 text-sm text-gray-400">
            <span class="text-brand-green mt-0.5 flex-shrink-0">&#9658;</span>
            {{ highlight }}
          </li>
        </ul>
        <div class="flex flex-wrap gap-2">
          <span
            *ngFor="let tag of exp.tags"
            class="text-xs font-mono px-3 py-1 bg-gray-800 text-gray-300 border border-gray-700 rounded-full"
          >
            {{ tag }}
          </span>
        </div>
      </div>
    </div>
  </div>
</section>
