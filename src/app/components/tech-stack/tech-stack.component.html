<section id="tech-stack" class="py-20 px-6 scroll-mt-32 lg:scroll-mt-28">
  <div class="max-w-6xl mx-auto">
    <div class="mb-12">
      <p class="text-brand-green font-mono text-sm tracking-widest uppercase mb-2">Stack</p>
      <h2 class="text-[clamp(1.75rem,3.2vw,2.35rem)] font-bold text-white">Tecnologias</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <article
        *ngFor="let domain of techDomains"
        class="rounded-xl border border-gray-800 bg-gray-900/70 p-5"
      >
        <h3 class="text-[clamp(0.95rem,1.8vw,1.1rem)] font-semibold text-gray-100 mb-4">{{ domain.name }}</h3>
        <div class="flex flex-wrap gap-2">
          <span
            *ngFor="let item of domain.items"
            class="text-[clamp(0.78rem,1.3vw,0.92rem)] px-3 py-1.5 rounded-md border border-gray-700 bg-gray-900 text-gray-300"
          >
            {{ item }}
          </span>
        </div>
      </article>
    </div>
  </div>
</section>
